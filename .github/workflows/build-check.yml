name: Verify Build

on:
  push:
    branches: [ main ]  # Runs on every push to the main branch
  pull_request:
    branches: [ main ]  # Runs on every PR targeting the main branch

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Matches most modern Next.js projects
          cache: 'npm'       # Caches dependencies to make builds faster

      - name: Install dependencies
        run: npm ci          # 'npm ci' is faster and more reliable than 'npm install' in CI

      - name: Build Next.js project
        run: npm run build
